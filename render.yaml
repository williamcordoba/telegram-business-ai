services:
  - type: web
    name: telegram-business-ai
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    autoDeployTrigger: commit
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: ALLOWED_TELEGRAM_USER_IDS
        sync: false
      - key: WEBHOOK_SECRET
        generateValue: true
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
